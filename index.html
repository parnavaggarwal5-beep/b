<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>HBD Love</title>

<script src="./file/jquery.min.js"></script>

<script src="./file/jscex.min.js"></script>

<script src="./file/jscex-parser.js"></script>

<script src="./file/jscex-jit.js"></script>

<script src="./file/jscex-builderbase.min.js"></script>

<script src="./file/jscex-async.min.js"></script>

<script src="./file/jscex-async-powerpack.min.js"></script>

<script src="./file/functions.js"></script>

<script src="./file/love.js"></script>

<style>
body {
  margin: 0;
  background: #ffe;
  text-align: center;
  font-family: Arial;
}

/* Envelope */
.envelope {
  position: relative;
  width: 300px;
  height: 200px;
  margin: 50px auto;
  cursor: pointer;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: pink;
  transform-origin: top;
  transition: transform 0.6s;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.letter {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  padding: 20px;
  box-sizing: border-box;
  opacity: 0;
  transition: opacity 1s ease 0.5s;
}

.envelope.open .letter {
  opacity: 1;
}

/* 💖 NEW BEAUTIFUL TEXT ANIMATION */
.romantic-text {
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  margin: 10px 0;
  font-size: 18px;
  color: #ff4d6d;
  letter-spacing: 2px;
  text-shadow: 0 0 5px rgba(255, 77, 109, 0.4);
  animation: romanticFade 1.5s ease forwards;
}

@keyframes romanticFade {
  0% {
    opacity: 0;
    transform: translateY(30px) scale(0.95);
    letter-spacing: 6px;
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    letter-spacing: 2px;
  }
}

/* Canvas */
#canvas {
  margin-top: 20px;
}
</style>

<script>
function openLetter() {
  document.querySelector(".envelope").classList.add("open");
}

function playAudio() {
  document.getElementById("myAudio").play();
}
</script>

</head>

<body>

<audio autoplay id="myAudio">
  <source src="aud.mp3" type="audio/mp3">
</audio>

<div class="envelope" onclick="openLetter(); playAudio();">
  <div class="flap"></div>

  <div class="letter">
    <p class="romantic-text" style="animation-delay:0.5s;">Happy Birthday Parshi 🎈</p>
    <p class="romantic-text" style="animation-delay:2s;">My beautiful wife 💕</p>
    <p class="romantic-text" style="animation-delay:3.5s;">May God bless you 🍀</p>
    <p class="romantic-text" style="animation-delay:5s;">I love you ❤️</p>
  </div>
</div>

<canvas id="canvas" width="1100" height="680"></canvas>

<script>
(function() {
    var canvas = $('#canvas');

    if (!canvas[0].getContext) return;

    var width = canvas.width();
    var height = canvas.height();
    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: {
            x: width / 2 - 20,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [535, 680, 570, 250, 500, 200, 30, 100]
        ],
        bloom: {
            num: 500,
            width: 1080,
            height: 650,
        },
        footer: {
            width: 1200,
            height: 5,
            speed: 10,
        }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    canvas.click(function() {
        hold = 0;
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
    }));

    runAsync().start();
})();
</script>

</body>
</html>
